                              </div>
                          </div>
                          <p className="text-[11px] text-gray-500 dark:text-gray-400 pl-1">Catenary Analysis & Cloud Engine Solver</p>
                      </div>
                      <div className="flex-1 overflow-hidden p-4">
                          <InputPanel
                              waterDepth={waterDepth} setWaterDepth={setWaterDepth}
                              fairleadElev={fairleadElev} setFairleadElev={setFairleadElev}
                              segments={segments} setSegments={setSegments}
                              buoys={buoys} setBuoys={setBuoys}
                              tensions={tensionsStr} setTensions={setTensionsStr}
                              calculate={handleCalculate} loading={loading}
                              showMaxTension={showMaxTension} setShowMaxTension={setShowMaxTension}
                              subseaStructures={subseaStructuresStr} setSubseaStructures={setSubseaStructuresStr}
                              calcMode={calcMode} setCalcMode={(m) => {
                                  if (m === calcMode) return;
                                  setCalcMode(m);
                                  if (m === 'offset') {
                                      const totalLen = segments.reduce((acc, s) => acc + (typeof s.length === 'string' ? parseFloat(s.length) : s.length), 0);
                                      setTensionsStr(totalLen.toFixed(1));
                                  } else {
                                      setTensionsStr("5, 20, 40");
                                  }
                              }}
                              projectName={projectName} setProjectName={setProjectName}
                          />
                      </div>
                  </div>

                  <div className={`flex-1 flex flex-col p-6 h-full overflow-hidden relative ${theme === 'dark' ? 'bg-[#0B0F19]' : 'bg-gray-50'}`}>
                      <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{backgroundImage: 'linear-gradient(#6b7280 1px, transparent 1px), linear-gradient(90deg, #6b7280 1px, transparent 1px)', backgroundSize: '40px 40px'}}></div>
                      <div className="relative z-10 h-full flex flex-col gap-4">
                          <div className="flex gap-2 border-b border-gray-200 dark:border-gray-800 pb-0">
                              {configs.map(c => (
                                  <div key={c.id} onClick={() => { setActiveTabId(c.id); setPendingCalc(true); }} className={`cursor-pointer px-4 py-2 rounded-t-lg text-sm font-bold transition-colors ${activeTabId === c.id ? (theme === 'dark' ? 'bg-[#0B0F19] text-accent-400 border-t-2 border-l border-r border-gray-800 border-t-accent-500 relative top-[1px]' : 'bg-white text-accent-600 border-t-2 border-l border-r border-gray-200 border-t-accent-600 relative top-[1px] shadow-sm') : (theme === 'dark' ? 'bg-gray-900/50 text-gray-500 hover:bg-gray-800 hover:text-gray-300' : 'bg-gray-200/50 text-gray-500 hover:bg-white hover:text-gray-700')}`}>
                                      {c.projectName}
                                      {configs.length > 1 && (
                                          <button onClick={(e) => { e.stopPropagation(); setConfigs(configs.filter(config => config.id !== c.id)); if (activeTabId === c.id) { setActiveTabId(configs.find(config => config.id !== c.id).id); } }} className="ml-2 text-gray-400 hover:text-red-500 rounded-full hover:bg-white/20 p-0.5" title="Close Tab">✕</button>
                                      )}
                                  </div>
                              ))}
                              <button onClick={() => { const newId = Math.max(0, ...configs.map(c => c.id)) + 1; setConfigs([...configs, createDefaultConfig(newId)]); setActiveTabId(newId); setPendingCalc(true); }} className="px-3 py-2 text-gray-500 hover:text-accent-500 transition-colors self-end mb-1" title="New Tab"><IconPlus size={18} /></button>
                          </div>
                      
                          {calcError && <ErrorBanner message={calcError} onClose={() => setCalcError(null)} />}
                          <ChartPanel configs={configs} activeConfigId={activeTabId} structures={structures} theme={theme} />
                          <ResultsTable results={results} />
                      </div>
                  </div>
              </div>
          );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(
        <React.StrictMode>
          <App />
        </React.StrictMode>
      );
    </script>
  </body>
</html>
