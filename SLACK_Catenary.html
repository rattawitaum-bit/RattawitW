<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SLACK - Catenary Calculation</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Prop Types -->
    <script crossorigin src="https://unpkg.com/prop-types/prop-types.min.js"></script>

    <!-- Recharts -->
    <script crossorigin src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              gray: { 50: '#f9fafb', 100: '#f3f4f6', 850: '#1f2937', 900: '#111827', 950: '#0B0F19' },
              accent: { 500: '#3b82f6', 600: '#2563eb' }
            }
          }
        }
      }
    </script>
    <style>
      body { background-color: #f3f4f6; color: #1f2937; transition: background-color 0.3s, color 0.3s; }
      .dark body { background-color: #0B0F19; color: #e5e7eb; }
      
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      .dark ::-webkit-scrollbar-thumb { background: #374151; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      .dark ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
      
      input[type=number]::-webkit-inner-spin-button, 
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
      input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useMemo, useRef } = React;
      
      const { 
        ScatterChart, Scatter, XAxis, YAxis, CartesianGrid, 
        Tooltip, ResponsiveContainer, ReferenceLine 
      } = window.Recharts;

      const SegmentType = { WIRE: 'WIRE', CHAIN: 'CHAIN', FIBER: 'FIBER' };

      const SEAWATER_DENSITY = 1025; 

      const MATERIAL_DENSITIES = { 
          [SegmentType.WIRE]: 7850, 
          [SegmentType.CHAIN]: 7850, 
          [SegmentType.FIBER]: 1400 
      };

      const SEGMENT_PRESETS = {
          [SegmentType.WIRE]: { w: 18.5, w_wet: 15.5, EA: 150000, frictionCoeff: 0.5 },
          [SegmentType.CHAIN]: { w: 120, w_wet: 104, EA: 800000, frictionCoeff: 1.0 },
          [SegmentType.FIBER]: { w: 3.5, w_wet: 0.8, EA: 25000, frictionCoeff: 0.4 }
      };

      const SIZE_STANDARDS = {
          [SegmentType.WIRE]: [
              { label: '1.5 inch (38mm)', w: 6.35, w_wet: 5.38, ea: 77000, frictionCoeff: 0.5 },
              { label: '2.5 inch (64mm)', w: 17.0, w_wet: 14.5, ea: 214000, frictionCoeff: 0.5 }
          ],
          [SegmentType.CHAIN]: [
              { label: '1 inch (25mm)', w: 14.1, w_wet: 12.2, ea: 400000, frictionCoeff: 1.0 },
              { label: '1.5 inch (38mm)', w: 32.0, w_wet: 27.8, ea: 800000, frictionCoeff: 1.0 },
              { label: '2 inch (51mm)', w: 57.0, w_wet: 49.5, ea: 1400000, frictionCoeff: 1.0 },
              { label: '2.5 inch (64mm)', w: 89.0, w_wet: 77.4, ea: 2200000, frictionCoeff: 1.0 },
              { label: '3 inch (76mm)', w: 128.0, w_wet: 111.3, ea: 3200000, frictionCoeff: 1.0 }
          ],
          [SegmentType.FIBER]: []
      };

      const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];

      const safeFloat = (val, defaultVal = 0) => {
          if (typeof val === 'number') return val;
          if (val === undefined || val === null) return defaultVal;
          const num = parseFloat(val);
          return isNaN(num) ? defaultVal : num;
      };

      // --- ICONS ---
      const IconAnchor = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="5" r="3"/><line x1="12" x2="12" y1="22" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg> );
      const IconLifeBuoy = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="4.93" x2="9.17" y1="4.93" y2="9.17"/><line x1="14.83" x2="19.07" y1="14.83" y2="19.07"/><line x1="14.83" x2="19.07" y1="9.17" y2="4.93"/><line x1="14.83" x2="9.17" y1="9.17" y2="14.83"/></svg> );
      const IconWaves = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg> );
      const IconChevronDown = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m6 9 6 6 6-6"/></svg> );
      const IconPlus = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M5 12h14"/><path d="M12 5v14"/></svg> );
      const IconX = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg> );
      const IconTrash2 = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg> );
      const IconPlay = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="6 3 20 12 6 21 6 3"/></svg> );
      const IconSettings2 = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg> );
      const IconInfo = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg> );
      const IconSun = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg> );
      const IconMoon = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg> );
      const IconHelp = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg> );
      const IconRefresh = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg> );
      const IconWarning = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg> );
      const IconImport = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> );
      const IconExport = ({ size = 24, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> );

      // --- COMPONENTS ---
      function SectionHeader({ title, icon: Icon }) {
          return (
              <div className="flex items-center gap-2 mb-3 pb-2 border-b border-gray-200 dark:border-gray-700/50">
                  {Icon && <Icon size={14} className="text-accent-600 dark:text-accent-500" />}
                  <h3 className="text-[11px] uppercase font-bold text-gray-500 dark:text-gray-400 tracking-wider">{title}</h3>
              </div>
          );
      }

      function ErrorBanner({ message, onClose }) {
          return (
              <div className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 px-4 py-3 rounded-lg mb-4 flex items-start gap-3 shadow-sm animate-in fade-in slide-in-from-top-2">
                  <IconWarning className="shrink-0 mt-0.5" size={18} />
                  <div className="flex-1 text-sm whitespace-pre-wrap">{message}</div>
                  <button onClick={onClose} className="text-red-500 hover:text-red-700 dark:hover:text-red-200 transition-colors">
                      <IconX size={16} />
                  </button>
              </div>
          );
      }

      function InputField({ label, value, onChange, unit, type = "number", placeholder, children, highlight, error, min, className, ...props }) {
          return (
              <div className={`group ${className || ''}`}>
                  <label className="block text-[10px] font-medium text-gray-500 dark:text-gray-500 mb-1 group-focus-within:text-accent-600 dark:group-focus-within:text-accent-500 transition-colors flex justify-between">
                      {label}
                      {highlight && <span className="text-[9px] text-amber-600 dark:text-amber-500 font-bold bg-amber-100 dark:bg-amber-900/30 px-1 rounded flex items-center gap-1">MANUAL</span>}
                      {error && <span className="text-[9px] text-red-500 font-bold uppercase">{error}</span>}
                  </label>
                  <div className="relative">
                      <input
                          type={type}
                          value={value}
                          onChange={onChange}
                          placeholder={placeholder}
                          min={min}
                          className={`w-full bg-white dark:bg-gray-900 border rounded pl-2 pr-7 py-1.5 text-xs text-gray-800 dark:text-gray-200 outline-none transition-all shadow-sm 
                              ${error 
                                  ? 'border-red-500 focus:border-red-500 ring-red-500/10' 
                                  : highlight 
                                      ? 'border-amber-400 ring-amber-400/20 focus:border-amber-500 focus:ring-amber-500 bg-amber-50 dark:bg-amber-900/10' 
                                      : 'border-gray-300 dark:border-gray-700 focus:border-accent-500 focus:ring-1 focus:ring-accent-500'
                              }`}
                          {...props}
                      />
                      {unit && <span className="absolute right-2 top-1.5 text-[10px] text-gray-500 dark:text-gray-400 pointer-events-none select-none">{unit}</span>}
                      {children}
                  </div>
              </div>
          );
      }

      function SelectField({ label, value, onChange, children }) {
          return (
              <div className="group">
                  <label className="block text-[10px] font-medium text-gray-500 dark:text-gray-500 mb-1 group-focus-within:text-accent-600 dark:group-focus-within:text-accent-500 transition-colors">{label}</label>
                  <div className="relative">
                      <select value={value} onChange={onChange} className="w-full bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded px-2 py-1.5 text-xs text-gray-800 dark:text-gray-200 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 outline-none appearance-none transition-all shadow-sm">
                          {children}
                      </select>
                      <IconChevronDown size={12} className="absolute right-2 top-2 text-gray-400 pointer-events-none" />
                  </div>
              </div>
          );
      }

      function UserGuideModal({ onClose }) {
          return (
              <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                  <div className="bg-white dark:bg-gray-900 rounded-lg shadow-2xl max-w-md w-full max-h-[80vh] flex flex-col border border-gray-200 dark:border-gray-700 animate-in fade-in zoom-in duration-200">
                      <div className="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-800">
                          <h2 className="text-lg font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
                              <IconInfo className="text-accent-500" size={20} /> User Guide
                          </h2>
                          <button onClick={onClose} className="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300"><IconX size={20} /></button>
                      </div>
                      <div className="p-6 overflow-y-auto text-sm text-gray-600 dark:text-gray-300 space-y-5">
                          <div>
                              <h3 className="text-xs font-bold text-accent-600 dark:text-accent-400 uppercase tracking-wider mb-2">1. Overview</h3>
                              <p className="text-gray-900 dark:text-white">
                                  <strong>SLACK Cloud Engine</strong> is a professional <strong>Grade 1 (Static) Catenary Suite</strong> designed for mooring analysis. It supports multi-configuration comparison and is powered by a high-precision Cloudflare Worker.
                              </p>
                          </div>
                          <div>
                              <h3 className="text-xs font-bold text-accent-600 dark:text-accent-400 uppercase tracking-wider mb-2 border-t border-gray-100 dark:border-gray-800 pt-2">2. Multi-Tab Comparison</h3>
                              <p className="mb-2">Click the <strong>+</strong> button to add configurations. The chart aggregates all tabs:</p>
                              <ul className="list-disc pl-4 space-y-1">
                                  <li><strong>Active Tab:</strong> Shown in full color with detailed labels.</li>
                                  <li><strong>Inactive Tab:</strong> Shown as dimmed background profiles for easy comparison.</li>
                                  <li><strong>Project Name:</strong> Used as the legend label and filename for export.</li>
                              </ul>
                          </div>
                          <div>
                              <h3 className="text-xs font-bold text-accent-600 dark:text-accent-400 uppercase tracking-wider mb-2 border-t border-gray-100 dark:border-gray-800 pt-2">3. Engineering Outputs</h3>
                              <ul className="list-disc pl-4 space-y-2">
                                  <li><strong>FL Ten (t):</strong> Fairlead Resultant Tension (T_FL = √(H² + V²)). Critical for clamp/shackle selection.</li>
                                  <li><strong>Anch V (t):</strong> Vertical uplift at anchor. A ⚠ warning indicates the line is fully airborne at the seabed.</li>
                                  <li><strong>Grounded (m):</strong> Length of the line resting on the seabed.</li>
                              </ul>
                          </div>
                          <div>
                              <h3 className="text-xs font-bold text-accent-600 dark:text-accent-400 uppercase tracking-wider mb-2 border-t border-gray-100 dark:border-gray-800 pt-2">4. Calculation Modes</h3>
                              <ul className="list-disc pl-4 space-y-2">
                                  <li><strong>Tension Mode:</strong> Profile for specific Horizontal Tensions (H).</li>
                                  <li><strong>Offset Mode:</strong> Tension required to achieve a specific horizontal offset.</li>
                                  <li><strong>Find Max (0m Grd):</strong> Finds the exact tension where the line just lifts off the seabed (Pink line).</li>
                              </ul>
                          </div>
                          <div>
                              <h3 className="text-xs font-bold text-accent-600 dark:text-accent-400 uppercase tracking-wider mb-2 border-t border-gray-100 dark:border-gray-800 pt-2">5. Data Management</h3>
                              <ul className="list-disc pl-4 space-y-1">
                                  <li><strong>Import/Export:</strong> Save and load mooring setups via JSON.</li>
                                  <li><strong>Standards:</strong> Use the sizing dropdown to auto-fill material density, EA, and friction coefficients (µ).</li>
                              </ul>
                          </div>
                      </div>
                      <div className="p-4 border-t border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50 rounded-b-lg flex flex-col gap-3">
                          <div className="flex justify-between items-center text-[10px] text-gray-400 dark:text-gray-500 font-mono px-1">
                              <span>Frontend: v260429</span>
                              <span>Worker: v260429</span>
                          </div>
                          <button onClick={onClose} className="w-full py-2 bg-accent-600 hover:bg-accent-500 text-white rounded font-medium transition-colors shadow-sm text-sm">Close Guide</button>
                      </div>
                  </div>
              </div>
          );
      }

      const InputPanel = ({
          waterDepth, setWaterDepth,
          fairleadElev, setFairleadElev,
          segments, setSegments,
          buoys, setBuoys,
          tensions, setTensions,
          calculate, loading,
          showMaxTension, setShowMaxTension,
          subseaStructures, setSubseaStructures,
          calcMode, setCalcMode,
          projectName, setProjectName
      }) => {

          const validatePositive = (val, allowZero = true) => {
              if (val === '' || val === null || val === undefined || isNaN(val)) return false;
              return allowZero ? val >= 0 : val > 0;
          };

          const handleTypeChange = (index, newType) => {
              const defaults = SEGMENT_PRESETS[newType];
              const newSegs = [...segments];
              newSegs[index] = { ...newSegs[index], type: newType, w: defaults.w, w_wet: defaults.w_wet, EA: defaults.EA, frictionCoeff: defaults.frictionCoeff };
              setSegments(newSegs);
          };

          const handleSizeChange = (index, sizeDataStr) => {
              if (!sizeDataStr) return;
              const sizeData = JSON.parse(sizeDataStr);
              const newSegs = [...segments];
              newSegs[index] = { ...newSegs[index], w: sizeData.w, w_wet: sizeData.w_wet, EA: sizeData.ea, frictionCoeff: sizeData.frictionCoeff !== undefined ? sizeData.frictionCoeff : newSegs[index].frictionCoeff };
              setSegments(newSegs);
          };

          const updateSegment = (index, field, value) => {
              const newSegs = [...segments];
              newSegs[index] = { ...newSegs[index], [field]: value };
              if (field === 'w') { newSegs[index].w_wet = ''; }
              setSegments(newSegs);
          };

          const addSegment = () => {
              const defaults = SEGMENT_PRESETS[SegmentType.WIRE];
              setSegments([...segments, { id: `seg-${Date.now()}`, type: SegmentType.WIRE, length: 100, w: defaults.w, w_wet: defaults.w_wet, EA: defaults.EA, frictionCoeff: defaults.frictionCoeff }]);
          };

          const removeSegment = (index) => {
              if (segments.length <= 1) return;
              setSegments(segments.filter((_, i) => i !== index));
          };

          const updateBuoy = (index, field, value) => {
              const newBuoys = [...buoys];
              newBuoys[index] = { ...newBuoys[index], [field]: value };
              if (field === 'pennantLength') {
                  const len = parseFloat(value) || 0;
                  const estimatedWeight = len * 0.003;
                  newBuoys[index].pennantWeight = parseFloat(estimatedWeight.toFixed(3));
                  if (!newBuoys[index].pennantLoad) { newBuoys[index].pennantLoad = 0.05; }
              }
              setBuoys(newBuoys);
          };

          const addBuoy = () => {
              setBuoys([...buoys, { id: `buoy-${Date.now()}`, distanceFromAnchor: 100, netBuoyancy: 5, pennantLength: 10, pennantWeight: 0.2, pennantLoad: 0.05, height: 2.0, pennantSag: 2.0 }]);
          };

          const removeBuoy = (index) => {
              setBuoys(buoys.filter((_, i) => i !== index));
          };

          const isFairleadInvalid = !validatePositive(parseFloat(fairleadElev), true);

          return (
              <div className="flex flex-col h-full relative">
                  <div className="flex-1 overflow-y-auto pr-2 pb-4 space-y-6 scrollbar-thin scrollbar-thumb-gray-300 dark:scrollbar-thumb-gray-700">
                      <section>
                          <SectionHeader title="Environment" icon={IconWaves} />
                          <div className="space-y-3 p-3 bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm border border-gray-200 dark:border-gray-700 rounded-lg">
                              <InputField label="Project Name" value={projectName} onChange={e => setProjectName(e.target.value)} type="text" placeholder="e.g. Mooring_Line_A" className="col-span-2" />
                              <div className="grid grid-cols-2 gap-3">
                                  <InputField label="Water Depth" value={waterDepth} onChange={e => { const val = parseFloat(e.target.value); setWaterDepth(isNaN(val) ? 0 : Math.max(0, val)); }} unit="m" min={0} error={waterDepth <= 0 ? "Depth > 0" : undefined} />
                                  <InputField label="Fairlead Z" value={fairleadElev} onChange={e => setFairleadElev(e.target.value)} unit="m" error={isFairleadInvalid ? "Z ≥ 0" : undefined} />
                              </div>
                              <div className="border-t border-gray-200 dark:border-gray-700/50 mt-1 pt-2">
                                  <InputField label="Subsea Structures (Dist from FL)" value={subseaStructures} onChange={e => setSubseaStructures(e.target.value)} type="text" placeholder="e.g. 150, 400" />
                              </div>
                          </div>
                      </section>

                      <section>
                          <div className="flex justify-between items-center mb-2">
                              <SectionHeader title="Line Segments" icon={IconAnchor} />
                              <button onClick={addSegment} className="flex items-center gap-1 text-[10px] font-medium bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-1 rounded border border-gray-300 dark:border-gray-700 transition-colors">
                                  <IconPlus size={12} /> Add
                              </button>
                          </div>
                          <div className="space-y-3">
                              {segments.map((seg, idx) => {
                                  const density = MATERIAL_DENSITIES[seg.type] || 7850;
                                  const factor = (density - SEAWATER_DENSITY) / density;
                                  const dryVal = typeof seg.w === 'string' ? parseFloat(seg.w) : seg.w;
                                  const autoWet = (isNaN(dryVal) ? 0 : dryVal) * factor;
                                  const hasManualWet = seg.w_wet !== undefined && seg.w_wet !== null && seg.w_wet !== '' && !isNaN(parseFloat(seg.w_wet)) && parseFloat(seg.w_wet) !== 0;
                                  
                                  const isLenInvalid = !validatePositive(seg.length, false);
                                  const isWeightInvalid = !validatePositive(seg.w, false);
                                  const isEAInvalid = !validatePositive(seg.EA || 0, false);
                                  const isFrictionInvalid = !validatePositive(seg.frictionCoeff, true);

                                  return (
                                      <div key={seg.id} className="bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm border border-gray-200 dark:border-gray-700 p-3 rounded-lg group relative transition-all hover:border-gray-400 dark:hover:border-gray-600">
                                          <div className="flex justify-between items-start mb-2">
                                              <span className="text-xs font-bold text-gray-700 dark:text-gray-300 flex items-center gap-2"><span className="bg-gray-200 dark:bg-gray-800 text-gray-500 text-[10px] px-1.5 rounded">#{idx + 1}</span>{seg.type}</span>
                                              <button onClick={() => removeSegment(idx)} className="text-gray-400 hover:text-red-500 transition-colors p-1"><IconX size={14} /></button>
                                          </div>
                                          <div className="grid grid-cols-2 gap-3">
                                              <div className="col-span-2">
                                                  <SelectField label="Type" value={seg.type} onChange={e => handleTypeChange(idx, e.target.value)}>
                                                      <option value={SegmentType.WIRE}>Wire (Steel)</option>
                                                      <option value={SegmentType.CHAIN}>Chain (Studless)</option>
                                                      <option value={SegmentType.FIBER}>Fiber (Polyester)</option>
                                                  </SelectField>
                                              </div>
                                              {SIZE_STANDARDS[seg.type] && SIZE_STANDARDS[seg.type].length > 0 && (
                                                  <div className="col-span-2">
                                                      <SelectField label="Standard Size (Auto-Fill)" onChange={e => handleSizeChange(idx, e.target.value)}>
                                                          <option value="">-- Custom / Select Size --</option>
                                                          {SIZE_STANDARDS[seg.type].map((size, sIdx) => (<option key={sIdx} value={JSON.stringify(size)}>{size.label} ({size.w} kg/m)</option>))}
                                                      </SelectField>
                                                  </div>
                                              )}
                                              <div className="col-span-2">
                                                  <InputField label="Length" value={seg.length} onChange={e => { const val = parseFloat(e.target.value); if (!isNaN(val) && val >= 0) { updateSegment(idx, 'length', e.target.value) } else if (e.target.value === '') { updateSegment(idx, 'length', '') } }} min="0" unit="m" error={isLenInvalid ? "Len > 0" : undefined} />
                                              </div>
                                              <div className="col-span-2 border-t border-gray-200 dark:border-gray-700/50 my-1"></div>
                                              <InputField label="Weight (Dry)" value={seg.w} onChange={e => { updateSegment(idx, 'w', e.target.value); }} unit="kg/m" error={isWeightInvalid ? "W > 0" : undefined} />
                                              <InputField label="Weight (Wet)" value={seg.w_wet || ''} onChange={e => updateSegment(idx, 'w_wet', e.target.value)} unit="kg/m" placeholder={`Auto: ${autoWet.toFixed(2)}`} highlight={hasManualWet}>
                                                  {hasManualWet && (
                                                      <button onClick={() => updateSegment(idx, 'w_wet', '')} className="absolute right-9 top-1.5 text-[10px] text-amber-600 dark:text-amber-500 hover:text-red-500 font-bold px-1 rounded hover:bg-white/50" title="Clear Manual Override">✕</button>
                                                  )}
                                              </InputField>
                                              <InputField label="Stiffness (EA)" value={seg.EA} onChange={e => { const val = parseFloat(e.target.value); if(!isNaN(val) && val >= 0) updateSegment(idx, 'EA', e.target.value); else if(e.target.value==='') updateSegment(idx, 'EA', ''); }} unit="kN" placeholder="Infinite" error={isEAInvalid ? "EA > 0" : undefined} />
                                              <InputField label="Friction Coeff" value={seg.frictionCoeff} onChange={e => { const val = parseFloat(e.target.value); if(!isNaN(val) && val >= 0) updateSegment(idx, 'frictionCoeff', e.target.value); else if(e.target.value==='') updateSegment(idx, 'frictionCoeff', ''); }} unit="" error={isFrictionInvalid ? "µ ≥ 0" : undefined} />
                                          </div>
                                      </div>
                                  );
                              })}
                          </div>
                      </section>

                      <section>
                          <div className="flex justify-between items-center mb-2">
                              <SectionHeader title="Buoys" icon={IconLifeBuoy} />
                              <button onClick={addBuoy} className="flex items-center gap-1 text-[10px] font-medium bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-1 rounded border border-gray-300 dark:border-gray-700 transition-colors">
                                  <IconPlus size={12} /> Add
                              </button>
                          </div>
                          {buoys.map((b, idx) => {
                              const totalLength = segments.reduce((acc, s) => acc + (typeof s.length === 'string' ? parseFloat(s.length) : s.length), 0);
                              const isOutOfBounds = b.distanceFromAnchor > totalLength;
                              const isDistInvalid = !validatePositive(b.distanceFromAnchor, true);
                              const isBuoyancyInvalid = !validatePositive(b.netBuoyancy, true);
                              const isPennantWInvalid = !validatePositive(b.pennantWeight, true);
                              const isPennantLoadInvalid = !validatePositive(b.pennantLoad || 0, true);
                              const isPennantLInvalid = !validatePositive(b.pennantLength, true);
                              const isPennantSagInvalid = !validatePositive(b.pennantSag || 0, true);
                              const isHeightInvalid = !validatePositive(b.height, true);

                              return (
                                  <div key={b.id} className="bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm border border-gray-200 dark:border-gray-700 p-3 rounded-lg relative mb-2 border-l-2 border-l-yellow-500/50">
                                      <div className="flex justify-between items-start mb-2">
                                          <span className="text-xs font-bold text-yellow-600 dark:text-yellow-500">Buoy #{idx + 1}</span>
                                          <button onClick={() => removeBuoy(idx)} className="text-gray-400 hover:text-red-500 transition-colors p-1"><IconTrash2 size={12} /></button>
                                      </div>
                                      <div className="space-y-3">
                                          <InputField label="Dist from Anchor" value={b.distanceFromAnchor} onChange={e => { const val = parseFloat(e.target.value); if(!isNaN(val) && val >= 0) updateBuoy(idx, 'distanceFromAnchor', e.target.value); else if(e.target.value === '') updateBuoy(idx, 'distanceFromAnchor', ''); }} unit="m" error={isDistInvalid ? "Dist ≥ 0" : undefined} />
                                          {isOutOfBounds && <div className="text-[10px] text-red-500 font-bold mt-1 -mb-1">⚠ Warning: Buoy beyond line length ({totalLength.toFixed(1)}m)</div>}
                                          <div className="grid grid-cols-2 gap-3">
                                              <InputField label="Net Buoyancy" value={b.netBuoyancy} onChange={e => { const val = parseFloat(e.target.value); if(!isNaN(val) && val >= 0) updateBuoy(idx, 'netBuoyancy', e.target.value); else if(e.target.value === '') updateBuoy(idx, 'netBuoyancy', ''); }} unit="ton" error={isBuoyancyInvalid ? "Buoyancy ≥ 0" : undefined} />
                                              <InputField label="Pennant Length" value={b.pennantLength} onChange={e => { const val = parseFloat(e.target.value); if(!isNaN(val) && val >= 0) updateBuoy(idx, 'pennantLength', e.target.value); else if(e.target.value === '') updateBuoy(idx, 'pennantLength', ''); }} unit="m" error={isPennantLInvalid ? "Len ≥ 0" : undefined} />
                                              <InputField label="Pennant Wt (t) [~3kg/m]" title="Auto-computed as Pennant Length * 0.003 t/m" value={b.pennantWeight} onChange={e => { const val = parseFloat(e.target.value); if(!isNaN(val) && val >= 0) updateBuoy(idx, 'pennantWeight', e.target.value); else if(e.target.value === '') updateBuoy(idx, 'pennantWeight', ''); }} unit="ton" error={isPennantWInvalid ? "Wt ≥ 0" : undefined} />
                                              <InputField label="Misc Load (t)" value={b.pennantLoad || 0} onChange={e => { const val = parseFloat(e.target.value); if(!isNaN(val) && val >= 0) updateBuoy(idx, 'pennantLoad', e.target.value); else if(e.target.value === '') updateBuoy(idx, 'pennantLoad', ''); }} unit="ton" error={isPennantLoadInvalid ? "Load ≥ 0" : undefined} />
                                              <InputField label="Buoy Height" value={b.height} onChange={e => { const val = parseFloat(e.target.value); if(!isNaN(val) && val >= 0) updateBuoy(idx, 'height', e.target.value); else if(e.target.value === '') updateBuoy(idx, 'height', ''); }} unit="m" error={isHeightInvalid ? "H ≥ 0" : undefined} />
                                              <InputField label="Pennant Sag (Vis)" value={b.pennantSag || 0} onChange={e => { const val = parseFloat(e.target.value); if(!isNaN(val) && val >= 0) updateBuoy(idx, 'pennantSag', e.target.value); else if(e.target.value === '') updateBuoy(idx, 'pennantSag', ''); }} unit="m" error={isPennantSagInvalid ? "Sag ≥ 0" : undefined} />
                                          </div>
                                      </div>
                                  </div>
                              );
                          })}
                      </section>
                  </div>

                  <div className="pt-4 border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-[#0e121e] shrink-0">
                      {calcMode === 'offset' && (
                          <div className="mb-2 p-2 bg-amber-50 dark:bg-amber-900/20 border border-amber-100 dark:border-amber-800 rounded flex gap-2 items-start">
                              <IconWarning size={14} className="text-amber-500 shrink-0 mt-0.5" />
                              <p className="text-[10px] text-amber-700 dark:text-amber-200 leading-tight">
                                  <strong>Check Payout:</strong> Ensure 'Segment Length' matches the actual paid-out length.
                              </p>
                          </div>
                      )}
                      <div className="flex justify-between items-center mb-2 px-1">
                          <div className="flex items-center gap-2 bg-gray-100 dark:bg-gray-800 rounded p-0.5">
                              <button onClick={() => setCalcMode('tension')} className={`text-[9px] px-2 py-1 rounded font-bold transition-all ${calcMode === 'tension' ? 'bg-white dark:bg-gray-700 text-accent-600 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400'}`}>TENSION</button>
                              <button onClick={() => setCalcMode('offset')} className={`text-[9px] px-2 py-1 rounded font-bold transition-all ${calcMode === 'offset' ? 'bg-white dark:bg-gray-700 text-accent-600 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400'}`}>OFFSET</button>
                          </div>
                          <label className="flex items-center gap-2 cursor-pointer group">
                              <input type="checkbox" checked={showMaxTension} onChange={e => setShowMaxTension(e.target.checked)} disabled={loading} className="rounded bg-white dark:bg-gray-800 border-gray-400 dark:border-gray-600 text-accent-600 focus:ring-0 w-3.5 h-3.5 cursor-pointer disabled:opacity-50" />
                              <span className="text-[10px] text-fuchsia-600 dark:text-fuchsia-400 font-medium group-hover:text-fuchsia-500 transition-colors">Find Max (0m Grd)</span>
                          </label>
                      </div>

                      <div className="relative">
                          <label className="absolute -top-2 left-2 px-1 bg-white dark:bg-[#0e121e] text-[9px] font-bold text-accent-600 dark:text-accent-500 uppercase tracking-wider">
                              {calcMode === 'tension' ? 'Target Tensions (t)' : 'Target Offsets (m)'}
                          </label>
                          <input
                              type="text"
                              value={tensions}
                              onChange={e => setTensions(e.target.value)}
                              disabled={loading}
                              className={`w-full bg-white dark:bg-gray-900 border-2 rounded px-3 py-2 text-sm font-mono mb-3 focus:outline-none transition-colors placeholder-gray-400 dark:placeholder-gray-700 text-gray-800 dark:text-gray-200 disabled:opacity-50 ${calcMode === 'tension' ? 'border-gray-300 dark:border-gray-700 focus:border-accent-500' : 'border-emerald-200 dark:border-emerald-900/50 focus:border-emerald-500'}`}
                              placeholder={calcMode === 'tension' ? "e.g. 10, 50, 100" : "e.g. 50, 100, 200"}
                          />
                      </div>

                      <button onClick={calculate} disabled={loading} className={`w-full bg-accent-600 hover:bg-accent-500 text-white font-semibold py-2.5 rounded shadow-lg shadow-accent-500/20 active:scale-[0.99] transition-all flex justify-center items-center gap-2 ${loading ? 'opacity-70 cursor-wait' : ''}`}>
                          {loading ? <span>Processing Engine...</span> : <>{calcMode === 'tension' ? <IconPlay size={16} fill="currentColor" /> : <IconRefresh size={16} />} {calcMode === 'tension' ? 'Calculate Profile' : 'Find Tensions'}</>}
                      </button>
                  </div>
              </div>
          );
      };

      const ChartPanel = ({ configs, activeConfigId, theme, structures }) => {
          
          const chartData = useMemo(() => {
              let allData = [];
              const maxWaterDepth = configs.length > 0 ? Math.max(...configs.map(c => c.waterDepth)) : 73;

              configs.forEach((config) => {
                  const isConfigActive = config.id === activeConfigId;
                  const configData = config.results.map((res, resIdx) => {
                      const baseColor = res.isMaxTensionCase ? '#d946ef' : COLORS[resIdx % COLORS.length]; 
                      const color = isConfigActive ? baseColor : (theme === 'dark' ? '#374151' : '#d1d5db');
                      const xOffset = res.fairleadX;

                      const transformedPoints = res.points.map(p => ({
                          ...p,
                          x: xOffset - p.x,
                          z: Math.min(p.z, maxWaterDepth + 2),
                          caseTension: res.horizontalTension,
                          isMax: res.isMaxTensionCase
                      })).sort((a, b) => a.x - b.x);

                      const segments = {};
                      const buoys = [];

                      const transformedAnchor = transformedPoints.find(p => p.isAnchor);

                      transformedPoints.forEach((p) => {
                          if (p.segmentId) {
                              if (!segments[p.segmentId]) segments[p.segmentId] = [];
                              segments[p.segmentId].push(p);
                          }
                          if (p.isBuoy) {
                              const pennantLen = p.pennantLength || 0;
                              let visualZ = p.z - pennantLen;
                              if (visualZ < 0) visualZ = 0;
                              const sag = p.pennantSag || 0;
                              buoys.push({ ...p, pennantBaseZ: p.z, pennantTopZ: visualZ, pennantSag: sag });
                          }
                      });

                      return {
                          id: `${config.id}-${resIdx}`,
                          tabName: config.projectName,
                          isActiveTab: isConfigActive,
                          waterDepth: config.waterDepth,
                          horizontalTension: res.horizontalTension,
                          segments: Object.values(segments),
                          buoys,
                          buoysData: buoys.map(b => ({ x: b.x, z: b.pennantTopZ, utilization: b.buoyUtilization, isSlack: b.isSlack, pennantTopZ: b.pennantTopZ })),
                          anchor: transformedAnchor,
                          color,
                          isMax: res.isMaxTensionCase
                      };
                  });
                  allData.push(...configData);
              });
              return allData.sort((a, b) => (a.isActiveTab === b.isActiveTab ? 0 : a.isActiveTab ? 1 : -1));
          }, [configs, activeConfigId, theme]);

          const maxWaterDepth = configs.length > 0 ? Math.max(...configs.map(c => c.waterDepth)) : 73;
          const structurePoints = useMemo(() => structures.map((x, idx) => ({ x: x, z: maxWaterDepth, id: `struct-${idx}` })), [structures, maxWaterDepth]);

          const allZ = chartData.flatMap(d => d.segments.flat().map(p => p.z));
          const maxDepthRaw = allZ.length > 0 ? Math.max(maxWaterDepth + 10, ...allZ) : maxWaterDepth + 10;
          const minDepthRaw = -15;
          let yInterval = 10;
          const depthRange = maxDepthRaw - minDepthRaw;
          if (depthRange > 750) yInterval = 50;
          else if (depthRange > 250) yInterval = 25;
          const minDepth = Math.floor(minDepthRaw / yInterval) * yInterval;
          const maxDepth = Math.ceil(maxDepthRaw / yInterval) * yInterval;
          const yTicks = []; for (let z = minDepth; z <= maxDepth + 0.1; z += yInterval) yTicks.push(Number(z.toFixed(1)));

          const allX = chartData.flatMap(d => d.segments.flat().map(p => p.x));
          const anchorsX = chartData.map(d => d.anchor?.x || 0);
          const maxXRaw = allX.length > 0 ? Math.max(100, ...allX, ...anchorsX, ...structures) : 100;
          let xInterval = 100;
          if (maxXRaw / xInterval > 20) xInterval = 200;
          if (maxXRaw / xInterval > 20) xInterval = 500;
          const maxX = Math.ceil(maxXRaw / xInterval) * xInterval;
          const xTicks = []; for (let x = 0; x <= maxX + 0.1; x += xInterval) xTicks.push(Number(x.toFixed(1)));

          const isDark = theme === 'dark';
          const buoyStroke = isDark ? '#fff' : '#1f2937';

          const renderBuoyShape = (props) => {
              const { cx, cy, payload } = props;
              const isSlack = payload.isSlack;
              const util = payload.utilization || 0;
              const topZ = payload.pennantTopZ || 0;

              let fillColor = '#22c55e';
              if (util >= 0.85) fillColor = '#ef4444';
              else if (util >= 0.50) fillColor = '#f59e0b';
              if (isSlack) fillColor = '#d1d5db';

              return (
                  <g transform={`translate(${cx},${cy})`}>
                      {isSlack ? (
                          <React.Fragment>
                              <path d="M0,10 L-8,-4 L8,-4 Z" fill={fillColor} stroke={buoyStroke} strokeWidth={1.5} strokeDasharray="2 2" />
                              <text y={-10} textAnchor="middle" fontSize={9} fontWeight="bold" fill={isDark ? '#e5e7eb' : '#374151'} style={{textShadow: isDark ? '0 0 2px black' : '0 0 2px white'}}>SLACK</text>
                          </React.Fragment>
                      ) : (
                          <path d="M0,10 L-8,-4 L8,-4 Z" fill={fillColor} stroke={buoyStroke} strokeWidth={1.5} />
                      )}
                      {isSlack && <circle cx={0} cy={-8} r={2} fill="none" stroke={buoyStroke} strokeWidth={0.5} />}
                      <text x={12} y={-4} fontSize={9} fill={isDark ? "#9ca3af" : "#4b5563"} fontWeight="500">Z: {topZ.toFixed(1)}m</text>
                  </g>
              );
          };

          const renderAnchorShape = (props) => {
              const { cx, cy, fill } = props;
              return <rect x={cx-5} y={cy-5} width={10} height={10} fill={fill} stroke={buoyStroke} strokeWidth={1} />;
          };

          const renderStructureShape = (props) => {
              const { cx, cy, payload } = props;
              return (
                  <g transform={`translate(${cx},${cy})`} style={{ pointerEvents: 'none' }}>
                      <rect x={-14} y={-20} width={28} height={20} fill={isDark ? "rgba(239, 68, 68, 0.15)" : "rgba(239, 68, 68, 0.1)"} stroke={isDark ? "#ef4444" : "#dc2626"} strokeWidth={1} strokeDasharray="2 2" rx={3} />
                      <rect x={-8} y={-10} width={16} height={10} fill={isDark ? "#ef4444" : "#dc2626"} rx={1} stroke="none" />
                      <path d="M-14 -20 L-6 -20" stroke={isDark ? "#ef4444" : "#dc2626"} strokeWidth={1} />
                      <path d="M6 -20 L14 -20" stroke={isDark ? "#ef4444" : "#dc2626"} strokeWidth={1} />
                      <text x={0} y={-24} textAnchor="middle" fill={isDark ? "#ef4444" : "#dc2626"} fontSize={9} fontWeight="700" style={{textShadow: isDark ? '0 1px 2px rgba(0,0,0,0.8)' : 'none'}}>STRUCT</text>
                  </g>
              );
          };

          return (
              <div className="flex-1 bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm border border-gray-200 dark:border-gray-700 rounded-lg p-1 relative min-h-[400px] flex flex-col shadow-sm">
                  <div className="absolute top-4 left-4 z-10 bg-white/80 dark:bg-gray-900/80 backdrop-blur px-3 py-1 rounded border border-gray-200 dark:border-gray-700 shadow-sm">
                      <h3 className="text-gray-700 dark:text-gray-300 text-xs font-semibold flex items-center gap-2">
                          <IconSettings2 size={14} className="text-accent-600 dark:text-accent-500"/> Catenary Profile
                      </h3>
                  </div>
                  <div className="flex-1 w-full h-full">
                      <ResponsiveContainer width="100%" height="100%">
                          <ScatterChart margin={{ top: 40, right: 30, bottom: 40, left: 20 }}>
                              <CartesianGrid strokeDasharray="3 3" stroke={isDark ? "#374151" : "#e5e7eb"} strokeOpacity={0.6} />
                              <XAxis dataKey="x" type="number" unit="m" ticks={xTicks} domain={[0, maxX]} stroke={isDark ? "#9ca3af" : "#6b7280"} tick={{fontSize: 11, fill: isDark ? "#9ca3af" : "#6b7280"}} tickLine={{stroke: isDark ? "#4b5563" : "#d1d5db"}} label={{ value: 'Distance from Fairlead (m)', position: 'insideBottomRight', offset: -10, fill: isDark ? "#6b7280" : "#9ca3af", fontSize: 12 }} />
                              <YAxis dataKey="z" type="number" unit="m" ticks={yTicks} domain={[minDepth, maxDepth]} stroke={isDark ? "#9ca3af" : "#6b7280"} reversed={true} tick={{fontSize: 11, fill: isDark ? "#9ca3af" : "#6b7280"}} tickLine={{stroke: isDark ? "#4b5563" : "#d1d5db"}} label={{ value: 'Depth (m)', angle: -90, position: 'insideLeft', fill: isDark ? "#6b7280" : "#9ca3af", fontSize: 12 }} />
                              <Tooltip cursor={{ strokeDasharray: '3 3', stroke: isDark ? '#9ca3af' : '#6b7280', strokeWidth: 1 }} content={({ active, payload }) => {
                                  if (active && payload && payload.length) {
                                      const currentX = payload[0].payload.x;
                                      const getInterpolatedData = (caseData) => {
                                          const allPoints = caseData.segments.flat().sort((a, b) => a.x - b.x);
                                          let p1 = allPoints[0], p2 = allPoints[allPoints.length - 1];
                                          for (let i = 0; i < allPoints.length - 1; i++) { if (allPoints[i].x <= currentX && allPoints[i+1].x >= currentX) { p1 = allPoints[i]; p2 = allPoints[i+1]; break; } }
                                          if (!p1 || !p2) return null;
                                          const ratio = (currentX - p1.x) / (p2.x - p1.x || 1);
                                          const interpZ = p1.z + (p2.z - p1.z) * ratio;
                                          return { z: interpZ, heightAboveSeabed: caseData.waterDepth - interpZ };
                                      };
                                      return (
                                          <div className={`p-3 rounded shadow-lg text-xs border z-50 ${isDark ? 'bg-gray-900 border-gray-700 text-gray-200' : 'bg-white border-gray-200 text-gray-800'}`}>
                                              <div className="font-bold mb-2 border-b pb-1 border-gray-200 dark:border-gray-700">Distance: {currentX.toFixed(1)} m</div>
                                              <div className="flex flex-col gap-2">
                                                  {chartData.map((res) => {
                                                      const data = getInterpolatedData(res);
                                                      if (!data) return null;
                                                      const range = maxX * 0.05;
                                                      const nearbyBuoy = res.buoys.find(b => Math.abs(b.x - currentX) < Math.max(20, range));
                                                      let baseLabel = res.isMax ? `Max (${res.horizontalTension?.toFixed(1)}t)` : `Case ${res.horizontalTension?.toFixed(1)}t`;
                                                      const label = res.isActiveTab ? baseLabel : `[${res.tabName}] ${baseLabel}`;
                                                      let buoyInfo = null;
                                                      if(nearbyBuoy) {
                                                          const u = (nearbyBuoy.buoyUtilization || 0) * 100;
                                                          buoyInfo = <span className={`ml-1 text-[10px] ${u > 85 ? 'text-red-500 font-bold' : 'text-gray-400'}`}>({u.toFixed(0)}% Util)</span>;
                                                      }
                                                      return (
                                                          <div key={res.id} className="flex items-center justify-between gap-4">
                                                              <div className="flex items-center gap-2" style={{opacity: res.isActiveTab ? 1 : 0.6}}>
                                                                  <span className="w-2 h-2 rounded-full" style={{backgroundColor: res.color}}></span>
                                                                  <span className="font-mono">{label}</span>
                                                                  {buoyInfo}
                                                                  {nearbyBuoy && nearbyBuoy.isSlack && <span className="text-[9px] bg-gray-200 text-gray-600 px-1 rounded font-bold">SLACK</span>}
                                                              </div>
                                                              <div className="text-right"><span className={`font-semibold ${data.heightAboveSeabed < 0.1 ? 'text-gray-400' : 'text-accent-600 dark:text-accent-400'}`}>{data.heightAboveSeabed <= 0.05 ? 'On Seabed' : `H: ${data.heightAboveSeabed.toFixed(1)}m`}</span></div>
                                                          </div>
                                                      );
                                                  })}
                                              </div>
                                          </div>
                                      );
                                  }
                                  return null;
                              }} />
                              
                              {chartData.map((res) => (
                                  <React.Fragment key={res.id}>
                                      {res.buoys.map((b, bIdx) => {
                                          const pennantStroke = theme === 'dark' ? '#fbbf24' : '#d97706';
                                          return (
                                              <Scatter key={`pennant-wire-${res.id}-${bIdx}`} data={[{ x: b.x, z: b.pennantBaseZ }, { x: b.x, z: b.pennantTopZ }]} line={{ stroke: b.isSlack ? '#9ca3af' : pennantStroke, strokeWidth: 2, strokeDasharray: b.isSlack ? '5 5' : '2 2' }} shape={() => null} legendType="none" isAnimationActive={false} />
                                          );
                                      })}
                                      {res.segments.map((segPoints, sIdx) => {
                                          const segType = segPoints[0].segmentType;
                                          const isChain = segType === SegmentType.CHAIN;
                                          return (
                                              <Scatter key={`seg-${res.id}-${sIdx}`} data={segPoints} line={{ stroke: res.color, strokeWidth: isChain ? 3 : 2, strokeDasharray: isChain ? '6 4' : '0' }} shape={<circle r={8} fill="transparent" stroke="none" />} legendType="none" />
                                          );
                                      })}
                                      {res.buoysData.length > 0 && (
                                          <Scatter key={`buoys-${res.id}`} data={res.buoysData} shape={renderBuoyShape} legendType="none" />
                                      )}
                                      {res.anchor && (
                                          <Scatter key={`anchor-${res.id}`} data={[res.anchor]} shape={(props) => renderAnchorShape({...props, fill: res.color})} legendType="none" />
                                      )}
                                  </React.Fragment>
                              ))}
                              
                              {structurePoints.length > 0 && (
                                  <Scatter key="subsea-structures" data={structurePoints} shape={renderStructureShape} legendType="none" />
                              )}

                              <ReferenceLine y={0} stroke="#3b82f6" strokeDasharray="4 2" strokeOpacity={1} strokeWidth={1.5} ifOverflow="extendDomain" label={{ position: 'insideTopRight', value: 'Sea Surface', fill: '#3b82f6', fontSize: 10, fontWeight: 'bold' }} />
                              <ReferenceLine y={maxWaterDepth} stroke={isDark ? "#9ca3af" : "#6b7280"} strokeWidth={2} strokeOpacity={0.8} ifOverflow="extendDomain" label={{ position: 'insideBottomRight', value: 'Seabed', fill: isDark ? "#9ca3af" : "#6b7280", fontSize: 10, fontWeight: 'bold' }} />
                              
                              {structures.map((stX, idx) => (
                                  <ReferenceLine key={`struct-line-${idx}`} x={stX} stroke={isDark ? "#ef4444" : "#dc2626"} strokeDasharray="3 3" strokeOpacity={0.6} label={{ value: 'COLLISION ZONE', angle: -90, position: 'insideTopLeft', fill: isDark ? "#ef4444" : "#dc2626", fontSize: 8, opacity: 0.8, dy: 20 }} />
                              ))}
                          </ScatterChart>
                      </ResponsiveContainer>
                  </div>
                  <div className="absolute bottom-2 left-0 right-0 flex justify-center pointer-events-none">
                      <span className="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-[0.2em]">
                        {configs.find(c => c.id === activeConfigId)?.projectName || 'Mooring Analysis Profile'}
                      </span>
                  </div>
                  <div className="absolute bottom-4 left-14 flex gap-4 text-[10px] bg-white/90 dark:bg-gray-900/90 backdrop-blur px-3 py-2 rounded border border-gray-200 dark:border-gray-700 shadow-lg pointer-events-none select-none z-10">
                      <div className="flex items-center gap-2"><div className="w-6 h-0.5 bg-gray-500 dark:bg-gray-400"></div><span className="text-gray-600 dark:text-gray-400">Wire</span></div>
                      <div className="flex items-center gap-2"><div className="w-6 h-1 bg-transparent border-b-4 border-dotted border-orange-500"></div><span className="text-gray-600 dark:text-gray-400">Chain</span></div>
                      <div className="flex items-center gap-2"><div className="w-0 h-0 border-l-[5px] border-r-[5px] border-b-[10px] border-l-transparent border-r-transparent border-b-green-500"></div><span className="text-gray-600 dark:text-gray-400">Buoy (Safe)</span></div>
                      <div className="flex items-center gap-2"><div className="w-0 h-0 border-l-[5px] border-r-[5px] border-b-[10px] border-l-transparent border-r-transparent border-b-red-500"></div><span className="text-gray-600 dark:text-gray-400">Buoy (High Util)</span></div>
                  </div>
              </div>
          );
      };

      const ResultsTable = ({ results }) => {
          return (
              <div className="h-1/3 bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden flex flex-col shadow-lg mt-4">
                  <div className="px-4 py-3 border-b border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-900/50 flex justify-between items-center">
                      <h3 className="font-semibold text-gray-700 dark:text-gray-200 text-sm flex items-center gap-2"><IconInfo size={16} className="text-accent-600 dark:text-accent-500"/> Calculation Results</h3>
                  </div>
                  <div className="overflow-auto flex-1 p-0 scrollbar-thin scrollbar-thumb-gray-300 dark:scrollbar-thumb-gray-700">
                      <table className="w-full text-left text-sm text-gray-700 dark:text-gray-300">
                          <thead className="bg-gray-100 dark:bg-gray-850 text-[10px] uppercase font-bold text-gray-500 sticky top-0 shadow-sm z-10">
                              <tr>
                                  <th className="px-4 py-3 tracking-wider">Case (t)</th>
                                  <th className="px-4 py-3 tracking-wider">Total Length (m)</th>
                                  <th className="px-4 py-3 tracking-wider">Grounded (m)</th>
                                  <th className="px-4 py-3 tracking-wider">Anch H (t)</th>
                                  <th className="px-4 py-3 tracking-wider">Anch V (t)</th>
                                  <th className="px-4 py-3 tracking-wider">FL Ten (t)</th>
                                  <th className="px-4 py-3 tracking-wider">Offset (m)</th>
                                  <th className="px-4 py-3 tracking-wider" title="Shows geometric depth utilization % if partially submerged, or structural utilization % if fully submerged">Buoy Util (Depth/Struc)</th>
                              </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-200 dark:divide-gray-800/50">
                              {results.map((res, idx) => (
                                  <tr key={idx} className={`hover:bg-gray-50 dark:hover:bg-white/5 transition-colors ${res.isMaxTensionCase ? 'bg-fuchsia-50 dark:bg-fuchsia-900/10' : ''}`}>
                                      <td className="px-4 py-2.5 font-mono font-medium" style={{color: res.isMaxTensionCase ? '#d946ef' : COLORS[idx % COLORS.length]}}>{res.isMaxTensionCase ? `${res.horizontalTension?.toFixed(1)} (Max)` : res.horizontalTension?.toFixed(1)}</td>
                                      <td className="px-4 py-2.5">{res.totalLength?.toFixed(1)}</td>
                                      <td className={`px-4 py-2.5 font-mono font-medium ${res.isAnchorUplift ? 'text-red-600 dark:text-red-400 font-bold' : (res.isMaxTensionCase ? 'text-fuchsia-600 dark:text-fuchsia-400' : 'text-emerald-600 dark:text-emerald-400')}`}>
                                          {res.groundedLength?.toFixed(1)}
                                      </td>
                                      <td className="px-4 py-2.5">
                                          {res.anchorTension?.toFixed(2)}
                                      </td>
                                      <td className="px-4 py-2.5">
                                          {res.isAnchorUplift ? (
                                              <div className="flex items-center text-red-600 dark:text-red-400 font-bold gap-1">
                                                  {res.anchorUpliftForce?.toFixed(2)} {'\u26A0'}
                                              </div>
                                          ) : (
                                              <span className="text-gray-400">0.00</span>
                                          )}
                                      </td>
                                      <td className="px-4 py-2.5 font-medium">{res.fairleadTension?.toFixed(1)}</td>
                                      <td className="px-4 py-2.5">{res.fairleadX?.toFixed(1)}</td>
                                      <td className="px-4 py-2.5 text-xs">
                                          {res.points.filter(p => p.isBuoy).length > 0 ? (
                                              res.points.filter(p => p.isBuoy).map((b, i) => {
                                                  const util = (b.buoyUtilization || 0) * 100;
                                                  if (b.isSlack) {
                                                      return (
                                                          <span key={i} className="mr-2 whitespace-nowrap font-mono text-gray-500 dark:text-gray-400">
                                                              B{i+1}: {util.toFixed(0)}% <span className="ml-0.5 px-1 py-0.5 rounded bg-gray-200 dark:bg-gray-800 text-[9px] font-bold">SLACK</span>
                                                          </span>
                                                      );
                                                  }
                                                  if (util >= 99.5) {
                                                      return (
                                                          <span key={i} className="mr-2 whitespace-nowrap font-mono text-red-600 dark:text-red-400">
                                                              B{i+1}: <span className="ml-0.5 px-1 py-0.5 rounded bg-red-100 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-[9px] font-bold uppercase">Submerged</span>
                                                          </span>
                                                      );
                                                  }
                                                  return <span key={i} className="mr-2 whitespace-nowrap font-mono text-green-600 dark:text-green-400">B{i+1}: {util.toFixed(0)}%</span>;
                                              })
                                          ) : <span className="text-gray-400">-</span>}
                                      </td>
                                  </tr>
                              ))}
                              {results.length === 0 && ( <tr><td colSpan={8} className="px-4 py-8 text-center text-gray-500 italic">No results calculated yet.</td></tr> )}
                          </tbody>
                      </table>
                  </div>
              </div>
          );
      };

      const createDefaultConfig = (id) => ({
          id: id,
          projectName: `Mooring_Line_${id}`,
          waterDepth: 73,
          fairleadElev: "3",
          subseaStructuresStr: "0",
          segments: [
              { id: `seg-wire-${id}-1`, type: SegmentType.WIRE, length: 700, w: 6.35, w_wet: 5.38, EA: 77000, frictionCoeff: 0.5 },
              { id: `seg-chain-${id}-2`, type: SegmentType.CHAIN, length: 55, w: 32.0, w_wet: 27.8, EA: 800000, frictionCoeff: 1.0 }
          ],
          buoys: [
              { id: `buoy-${id}-1`, distanceFromAnchor: 500, netBuoyancy: 5, pennantLength: 30, pennantWeight: 0.2, height: 2.0, pennantSag: 2.0, pennantLoad: 0.05 }
          ],
          tensionsStr: "5, 20, 40",
          calcMode: 'tension',
          showMaxTension: false,
          results: []
      });

      const App = () => {
          const [theme, setTheme] = useState('dark');
          const [showGuide, setShowGuide] = useState(false);
          const [configs, setConfigs] = useState([createDefaultConfig(1)]);
          const [activeTabId, setActiveTabId] = useState(1);
          const [calcError, setCalcError] = useState(null);
          const [pendingCalc, setPendingCalc] = useState(false);
          const [exportToast, setExportToast] = useState(false);
          const [loading, setLoading] = useState(false);

          const activeConfig = configs.find(c => c.id === activeTabId) || configs[0];

          const updateConfig = (updates) => {
              setConfigs(prev => prev.map(c => c.id === activeTabId ? { ...c, ...updates } : c));
          };

          const projectName = activeConfig.projectName;
          const waterDepth = activeConfig.waterDepth;
          const fairleadElev = activeConfig.fairleadElev;
          const subseaStructuresStr = activeConfig.subseaStructuresStr;
          const segments = activeConfig.segments;
          const buoys = activeConfig.buoys;
          const tensionsStr = activeConfig.tensionsStr;
          const calcMode = activeConfig.calcMode;
          const showMaxTension = activeConfig.showMaxTension;
          const results = activeConfig.results;

          const setProjectName = (val) => updateConfig({ projectName: val });
          const setWaterDepth = (val) => updateConfig({ waterDepth: val });
          const setFairleadElev = (val) => updateConfig({ fairleadElev: val });
          const setSubseaStructuresStr = (val) => updateConfig({ subseaStructuresStr: val });
          const setSegments = (val) => updateConfig({ segments: val });
          const setBuoys = (val) => updateConfig({ buoys: val });
          const setTensionsStr = (val) => updateConfig({ tensionsStr: val });
          const setCalcMode = (val) => updateConfig({ calcMode: val });
          const setShowMaxTension = (val) => updateConfig({ showMaxTension: val });
          const setResults = (val) => updateConfig({ results: val });

          const fileInputRef = useRef(null);

          useEffect(() => {
              if (theme === 'dark') document.documentElement.classList.add('dark');
              else document.documentElement.classList.remove('dark');
          }, [theme]);

          const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

          const exportToJson = () => {
              const data = {
                  projectName, waterDepth, fairleadElev, subseaStructuresStr,
                  segments, buoys, tensionsStr, calcMode, showMaxTension,
                  version: "1.1", timestamp: new Date().toISOString()
              };
              const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
              const url = URL.createObjectURL(blob);
              const link = document.createElement('a');
              link.href = url;
              link.download = `${projectName.replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.json`;
              link.click();
              URL.revokeObjectURL(url);
              setExportToast(true);
              setTimeout(() => setExportToast(false), 2000);
          };

          const handleImport = (e) => {
              const file = e.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = (event) => {
                  try {
                      const data = JSON.parse(event.target.result);
                      const updates = {};
                      if (data.projectName !== undefined) updates.projectName = data.projectName;
                      if (data.waterDepth !== undefined) updates.waterDepth = data.waterDepth;
                      if (data.fairleadElev !== undefined) updates.fairleadElev = data.fairleadElev;
                      if (data.subseaStructuresStr !== undefined) updates.subseaStructuresStr = data.subseaStructuresStr;
                      
                      if (data.segments !== undefined) {
                          updates.segments = Array.isArray(data.segments) 
                              ? data.segments.map(s => ({ ...s, id: `seg-${Date.now()}-${Math.random().toString(36).substr(2, 5)}` })) 
                              : [];
                      }
                      if (data.buoys !== undefined) {
                          updates.buoys = Array.isArray(data.buoys) 
                              ? data.buoys.map(b => ({ ...b, id: `buoy-${Date.now()}-${Math.random().toString(36).substr(2, 5)}` })) 
                              : [];
                      }
                      
                      if (data.tensionsStr !== undefined) updates.tensionsStr = data.tensionsStr;
                      if (data.calcMode !== undefined) updates.calcMode = data.calcMode;
                      if (data.showMaxTension !== undefined) updates.showMaxTension = data.showMaxTension;
                      
                      updateConfig(updates);
                      setPendingCalc(true);
                  } catch (err) {
                      alert("Error: Invalid JSON Mooring Configuration File.");
                  } finally {
                      if (fileInputRef.current) fileInputRef.current.value = '';
                  }
              };
              reader.readAsText(file);
          };

          const handleCalculate = async () => {
              setCalcError(null);
              
              const inputs = tensionsStr.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n) && n > 0).sort((a, b) => a - b);
              if (inputs.length === 0 && !showMaxTension) return;

              setLoading(true);
              const flZ = -1 * (parseFloat(fairleadElev) || 0);

              // ----------------------------------------------------
              // CLOUD ENGINE INTEGRATION - FETCH API TO WORKER
              // ----------------------------------------------------
              const processedSegments = segments.map(seg => ({
                  ...seg,
                  EA: (seg.EA && parseFloat(seg.EA) > 0) ? parseFloat(seg.EA) : 1e9 // Default to highly rigid if empty to prevent NaN
              }));

              const payload = {
                  waterDepth: parseFloat(waterDepth),
                  targetZ: flZ,
                  segments: processedSegments,
                  buoys: buoys,
                  targets: inputs,
                  calcMode: calcMode,
                  calculateMax: showMaxTension
              };

              try {
                  // Replace with your actual Cloudflare Worker URL
                  const WORKER_URL = "https://catcal-engine.rattawit-aum.workers.dev/";
                  
                  const response = await fetch(WORKER_URL, {
                      method: "POST",
                      headers: { "Content-Type": "application/json" },
                      body: JSON.stringify(payload)
                  });

                  if (!response.ok) {
                      const errData = await response.json().catch(() => ({}));
                      throw new Error(errData.error || `Server engine failed to respond. HTTP Status: ${response.status}`);
                  }

                  const data = await response.json();
                  setResults(data);
              } catch (err) {
                  console.error(err);
                  setCalcError(err.message);
              } finally {
                  setLoading(false);
              }
          };

          useEffect(() => { handleCalculate(); }, []);

          useEffect(() => {
              if (pendingCalc) {
                  handleCalculate();
                  setPendingCalc(false);
              }
          }, [pendingCalc]);

          const structures = useMemo(() => {
              if (!subseaStructuresStr) return [];
              return subseaStructuresStr.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n) && n !== 0);
          }, [subseaStructuresStr]);

          const bgClass = theme === 'dark' ? 'bg-[#0B0F19] text-slate-200' : 'bg-gray-50 text-gray-800';
          const sidebarBorder = theme === 'dark' ? 'border-gray-800' : 'border-gray-200';
          const sidebarBg = theme === 'dark' ? 'bg-[#0e121e]' : 'bg-white';

          return (
              <div className={`flex h-screen w-screen overflow-hidden font-sans selection:bg-accent-500/30 ${bgClass}`}>
                  {showGuide && <UserGuideModal onClose={() => setShowGuide(false)} />}
                  
                  <div className={`w-[340px] flex-shrink-0 border-r ${sidebarBorder} h-full ${sidebarBg} flex flex-col transition-colors duration-300`}>
                      <div className={`p-4 border-b ${sidebarBorder}`}>
                          <div className="flex justify-between items-center mb-1">
                              <h1 className="text-xl font-bold tracking-tight flex items-center gap-3">
                                  <div className="w-9 h-9 rounded-lg bg-[#1f2937] flex items-center justify-center text-[#f59e0b] font-black text-xl shadow-sm border border-gray-700">S</div>
                                  <div className="flex flex-col">
                                      <span className="leading-none tracking-wider">SLACK</span>
                                      <span className="text-[10px] font-normal text-gray-400 dark:text-gray-500 mt-0.5">Dev by RattawitW</span>
                                  </div>
                              </h1>
                              <div className="flex gap-2">
                                  <button onClick={() => fileInputRef.current.click()} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 transition-colors" title="Import JSON"><IconImport size={18} /></button>
                                  <button onClick={exportToJson} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 transition-colors relative" title="Export JSON">
                                      <IconExport size={18} />
                                      {exportToast && <div className="absolute top-full mt-1 left-1/2 -translate-x-1/2 bg-emerald-500 text-white text-[10px] py-0.5 px-2 rounded font-bold shadow animate-in fade-in zoom-in whitespace-nowrap">✓ EXPORTED</div>}
                                  </button>
                                  <input type="file" ref={fileInputRef} onChange={handleImport} className="hidden" accept=".json" />
                                  <button onClick={() => setShowGuide(true)} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 transition-colors" title="Guide"><IconHelp size={18} /></button>
                                  <button onClick={toggleTheme} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 transition-colors" title="Theme">{theme === 'dark' ? <IconSun size={18} /> : <IconMoon size={18} />}</button>
